# Site Settings
title: COS Creatives
email: coscreativez@gmail.com
description: Lead Generation Agency Madurai | We help Tamil Nadu startups generate qualified inbound leads through SEO, content marketing, and Google Ads.
url: "https://www.coscreatives.in" # Your domain
baseurl: "" # Leave this empty

# Build Settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Resources collection (for downloadable guides/PDFs)
collections:
  resources:
    output: true
    permalink: /resources/:path/

# Exclude these from the build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
