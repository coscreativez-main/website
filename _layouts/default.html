<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{ page.title }}</title>
    <meta name="description" content="{{ page.description }}">

    <meta name="keywords" content="digital marketing Madurai, content marketing India, SEO services, social media marketing, startup marketing India">
    <meta name="author" content="COS Creatives">
    <meta name="robots" content="index, follow">

    <link rel="canonical" href="https://www.coscreatives.in{{ page.url }}">

    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:description" content="{{ page.description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.coscreatives.in{{ page.url }}">
    <meta property="og:image" content="https://www.coscreatives.in/assets/og-image.jpg">

    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="preload" href="/assets/css/style.css" as="style">

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "COS Creatives",
        "url": "https://www.coscreatives.in",
        "logo": "https://www.coscreatives.in/assets/logo.png",
        "description": "Digital Marketing and Content Marketing Agency in Madurai",
        "address": {
            "@type": "PostalAddress",
            "addressLocality": "Madurai",
            "addressRegion": "Tamil Nadu",
            "addressCountry": "India"
        }
    }
    </script>
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="logo">COS Creatives</div>

            <nav class="nav">
                <a href="/">Home</a>
                <a href="/about">About</a>
                <a href="/services">Services</a>
                <a href="/blog">Blog</a>
            </nav>

            <div class="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    {{ content }}
<script>
        document.addEventListener('DOMContentLoaded', function() {
            const menuToggle = document.querySelector('.menu-toggle');
            const nav = document.querySelector('.nav');

            if (menuToggle && nav) {
                menuToggle.addEventListener('click', function() {
                    // This adds or removes the 'active' class when you click
                    nav.classList.toggle('active');
                });
            }
        });
    </script>
</body>
</html>
