---
layout: default
---
<article class="post-container resource-container">
    <header class="post-header">
        <p class="post-date">{{ page.date | date: "%B %d, %Y" }}</p>
        {% if page.type %}
        <span class="resource-badge resource-badge--{{ page.type }}">{{ page.type | capitalize }}</span>
        {% endif %}
        <h1>{{ page.title }}</h1>
    </header>

    {% if page.thumbnail %}
    <img class="resource-thumbnail" src="{{ page.thumbnail | relative_url }}" alt="{{ page.title }}">
    {% endif %}

    <div class="post-content">
        {{ content }}
    </div>

    {% if page.file %}
    <div class="resource-cta">
        <a href="{{ page.file | relative_url }}" class="btn-download" download>{{ page.cta_label | default: "Download" }}</a>
    </div>
    {% endif %}
</article>
